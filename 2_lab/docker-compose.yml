version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      PG_HOST: db
      PG_PORT: "5432"
      PG_USERNAME: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: notes
      REDIS_HOST: keydb
      REDIS_PORT: "6379"
    depends_on:
      db:
        condition: service_healthy
      keydb:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  keydb:
    image: eqalpha/keydb:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
